<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete Your Onboarding — Referral Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; padding: 20px; }
    .boarding-card {
      width: 100%; max-width: 480px; padding: 40px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      animation: fadeIn 0.4s ease;
    }
    .status-msg { padding: 20px; border-radius: var(--radius-sm); margin-bottom: 20px; font-size: 14px; text-align: center; }
    .status-msg.error { background: var(--red-glow); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
    .status-msg.loading { color: var(--text-muted); }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
    .form-input { 
      width: 100%; padding: 12px; background: var(--surface-2); 
      border: 1px solid var(--border); border-radius: var(--radius-sm); 
      color: var(--text-primary); font-size: 14px; outline: none; transition: var(--transition);
    }
    .form-input:focus { border-color: var(--green); background: var(--surface-3); }
    .form-input:disabled { opacity: 0.6; cursor: not-allowed; }
    .checkbox-group { display: flex; align-items: flex-start; gap: 10px; margin: 24px 0; }
    .checkbox-group input { width: 18px; height: 18px; cursor: pointer; margin-top: 2px; }
    .checkbox-label { font-size: 13px; color: var(--text-secondary); line-height: 1.5; cursor: pointer; }
    .btn-finish { width: 100%; padding: 14px; background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; cursor: pointer; transition: all var(--transition); }
    .btn-finish:hover { background: #40a070; transform: translateY(-1px); }
    .btn-finish:disabled { opacity: 0.5; cursor: not-allowed; }
    #onboarding-form { display: none; }
  </style>
</head>
<body>

  <div class="boarding-card">
    <div style="text-align: center; margin-bottom: 32px;">
      <img src="/logo.png" alt="Logo" style="width: 64px; border-radius: 50%; margin-bottom: 16px;">
      <h1 class="card-title">Welcome to SunBolon SA</h1>
      <p style="font-size: 14px; color: var(--text-muted);">Activate your referral partner account</p>
    </div>

    <div id="status-area" class="status-msg loading">Validating invitation link...</div>

    <form id="onboarding-form">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="display-name" class="form-input" disabled />
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="display-email" class="form-input" disabled />
      </div>

      <div class="form-group">
        <label class="form-label">Set Your Password</label>
        <input type="password" id="password" class="form-input" placeholder="At least 6 characters" required minlength="6" />
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="terms" required />
        <label for="terms" class="checkbox-label">
          I accept the partner terms and conditions, and agree to promote SunBolon SA events ethically and professionally.
        </label>
      </div>

      <button type="submit" id="submit-btn" class="btn-finish">Complete Registration</button>
    </form>
    
    <div id="success-area" style="display:none; text-align:center;">
       <div style="font-size: 48px; margin-bottom: 20px;">🎉</div>
       <h2 style="color:var(--text-primary); margin-bottom: 12px;">Account Activated!</h2>
       <p style="color:var(--text-muted); font-size: 14px; margin-bottom: 24px;">Your partner dashboard is ready. Sign in with your email and the password you just set.</p>
       <a href="/login.html" class="btn btn-primary" style="display:inline-block; padding: 12px 24px;">Back to Login</a>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const statusArea = document.getElementById('status-area');
    const onboardingForm = document.getElementById('onboarding-form');
    const successArea = document.getElementById('success-area');

    async function verifyLink() {
      if (!token) {
        statusArea.textContent = 'Invalid link. No invitation token found.';
        statusArea.className = 'status-msg error';
        return;
      }

      try {
        const res = await fetch(`/api/invitations/verify/${token}`);
        const data = await res.json();

        if (!res.ok) {
          statusArea.textContent = data.error || 'This invitation has expired or is invalid.';
          statusArea.className = 'status-msg error';
          return;
        }

        // Token is valid
        document.getElementById('display-name').value = data.name;
        document.getElementById('display-email').value = data.email;
        statusArea.style.display = 'none';
        onboardingForm.style.display = 'block';
      } catch (err) {
        statusArea.textContent = 'Connection error. Please try again later.';
        statusArea.className = 'status-msg error';
      }
    }

    onboardingForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Activating...';

      const payload = {
        token,
        password: document.getElementById('password').value,
        termsAccepted: document.getElementById('terms').checked
      };

      try {
        const res = await fetch('/api/invitations/accept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Onboarding failed');

        onboardingForm.style.display = 'none';
        successArea.style.display = 'block';
      } catch (err) {
        statusArea.textContent = err.message;
        statusArea.className = 'status-msg error';
        statusArea.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Complete Registration';
      }
    });

    verifyLink();
  </script>
</body>
</html>
