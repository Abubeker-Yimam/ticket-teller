<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Referral Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .reset-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      animation: fadeIn 0.4s ease;
    }
    .reset-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .reset-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 14px;
      transition: all var(--transition);
      outline: none;
    }
    .form-input:focus {
      border-color: var(--green);
    }
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-submit:hover {
      background: #40a070;
    }
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #msg-box {
      padding: 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .msg-error {
      background: var(--red-glow);
      color: var(--red);
      border: 1px solid rgba(248, 113, 113, 0.2);
    }
    .msg-success {
      background: rgba(16, 185, 129, 0.1);
      color: #059669;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
  </style>
</head>
<body>

  <div class="reset-card">
    <div class="reset-header">
      <h1 class="reset-title">Create New Password</h1>
    </div>

    <div id="msg-box"></div>

    <form id="reset-form">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required />
      </div>
      <button type="submit" id="btn-submit" class="btn-submit">Save Password</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
      <a href="/login.html" style="font-size: 13px; color: var(--text-secondary); text-decoration: none;">&larr; Back to Login</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Config Injection
    window.SUPABASE_URL = "https://ozcbgffmlznsfcsuytdk.supabase.co";
    window.SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96Y2JnZmZtbHpuc2Zjc3V5dGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzI3NzIsImV4cCI6MjA5MTM0ODc3Mn0.pRiO7g1mMc_6_07rREbLGByKcuqTgu8VwoonZ3_eGhA";

    const form = document.getElementById('reset-form');
    const msgBox = document.getElementById('msg-box');
    const btnSubmit = document.getElementById('btn-submit');

    // Supabase client uses the URL hash to capture the access_token transparently when auth is initialized.
    const client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgBox.style.display = 'none';
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Saving...';

      const password = document.getElementById('password').value;

      try {
        const { error } = await client.auth.updateUser({ password });
        if (error) throw error;
        
        msgBox.textContent = 'Password updated successfully. You can now log in.';
        msgBox.className = 'msg-success';
        msgBox.style.display = 'block';
        form.style.display = 'none';
        
        setTimeout(() => {
          window.location.href = '/login.html';
        }, 2000);

      } catch (err) {
        msgBox.textContent = err.message;
        msgBox.className = 'msg-error';
        msgBox.style.display = 'block';
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Save Password';
      }
    });

  </script>
</body>
</html>
